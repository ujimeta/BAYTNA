kind = "web"
previewPath = "/"
title = "Havenly Real Estate"
version = "1.0.0"
id = "artifacts/havenly"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24872

[services.development]
run = "pnpm --filter @workspace/havenly run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/havenly", "run", "build" ]
publicDir = "artifacts/havenly/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24872"
BASE_PATH = "/"
